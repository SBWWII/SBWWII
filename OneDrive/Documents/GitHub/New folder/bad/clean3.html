  <style>
    /* Navigation CSS */
    nav ul {
      list-style-type: none;
      padding: 0;
      margin: 0;
    }
    nav ul li {
      position: relative;
      display: inline-block;
      padding: 10px;
    }
    nav ul li ul {
      display: none;
      position: absolute;
      background-color: white;
      padding: 0;
      border: 1px solid #ccc;
      z-index: 1000;
    }
    nav ul li:hover ul {
      display: block;
    }
    nav ul li ul li {
      display: block;
      padding: 8px 12px;
    }
    nav ul li ul li a {
      text-decoration: none;
      color: navy;
      display: block;
    }
    nav ul li ul li a:hover {
      background-color: #f0f0f0;
    }
    nav ul li a.active {
      color: red;
      font-weight: bold;
    }
    
    /* Main Page CSS */
    body {
      background-color: skyblue;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
    }
    .container {
      display: flex;
      justify-content: space-evenly;
      width: 90%;
      margin: 20px auto;
    }
    .box {
      background-color: white;
      padding: 20px;
      border: 2px solid black;
      width: 300px;
      height: 300px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Responsive adjustments */
    @media (max-width: 600px) {
      iframe {
        width: 100%;
        height: 600px;
      }
      .box {
        width: 100%;
        height: auto;
        margin-bottom: 10px;
      }
    }
  </style>
</head>
