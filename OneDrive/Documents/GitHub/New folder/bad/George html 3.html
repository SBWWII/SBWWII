<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>World War II Roundtable</title>
  <style>
    /* Improved Navigation CSS */
    nav ul {
      list-style-type: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-wrap: wrap; /* Improves responsiveness */
    }

    nav ul li {
      position: static;
      padding: 10px;
    }

    nav ul li ul {
      display: none;
      position: absolute;
      background-color: white;
      padding: 0;
      border: 1px solid #ccc;
      z-index: 1000;
    }

    nav ul li:hover ul,
    nav ul li:focus-within ul {
      display: block; /* Enables dropdown on keyboard focus */
    }

    nav ul li ul li {
      display: block;
      padding: 8px 12px;
    }

    nav a {
      text-decoration: none;
      color: navy;
      display: block;
      padding: 8px 12px;
    }

    nav a:hover {
      background-color: #f0f0f0;
      color: red;
    }

    nav a.active {
      color: red;
      font-weight: bold;
    }

    /* Page Layout */
    body {
      background: #6baed5; /* Improved contrast */
      color: black;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* Content Boxes */
    .container {
      display: flex;
      justify-content: space-around; /* Distributes images evenly */
      gap: 10px;
      flex-wrap: wrap;
      width: 90vw; /* Keeps content from touching screen edges */
    }

    .box {
      background-color: white;
      padding: 20px;
      border: 2px solid black;
      flex: 1 1 300px; /* Ensures uniform spacing */
      max-width: 300px;
    }

    .box img {
      width: 100%;
      height: auto;
      object-fit: cover;
    }

    /* Form Styling */
    form {
      margin-top: 20px;
      padding: 15px;
      background-color: white;
      border-radius: 8px;
      box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.2);
      width: min(90%, 500px); /* Improves scalability */
    }

    button {
      padding: 10px 15px;
      background-color: navy;
      color: white;
      font-size: 16px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      transition: background 0.3s;
    }

    button:hover {
      background-color: royalblue;
    }

    /* Mobile Responsiveness */
    @media (max-width: 768px) {
      .container {
        flex-direction: column;
        align-items: center;
      }

      .box {
        width: 100%;
      }

      form {
        width: 90%;
      }

      #submittedData {
        width: 95%;
      }
    }

    /* Debugging Section */
    #errorMessage {
      color: red;
      font-weight: bold;
    }
